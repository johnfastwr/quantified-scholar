<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="premium-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Deep dark glass background (optional, mainly for PWA splash but transparent by default for tab icons) -->
  <rect width="512" height="512" rx="120" fill="#09090b" />

  <!-- The stylized 'Q' / Data Node / Hourglass -->
  <g transform="translate(128, 128)" filter="url(#glow)">
    <!-- Outer hexagon (data/structure) -->
    <polygon 
      points="128,0 238,64 238,192 128,256 18,192 18,64" 
      fill="none" 
      stroke="url(#premium-gradient)" 
      stroke-width="16" 
      stroke-linejoin="round"
    />
    
    <!-- Inner hourglass / infinity mapping -->
    <path 
      d="M 64,64 L 192,192 M 192,64 L 64,192" 
      stroke="url(#premium-gradient)" 
      stroke-width="16" 
      stroke-linecap="round" 
    />
    
    <!-- Central focus core -->
    <circle cx="128" cy="128" r="32" fill="#09090b" stroke="url(#premium-gradient)" stroke-width="12" />
    
    <!-- The tail of the 'Q' indicating upward trajectory / chart -->
    <path 
      d="M 210,210 L 270,270" 
      stroke="url(#premium-gradient)" 
      stroke-width="20" 
      stroke-linecap="round" 
    />
  </g>
</svg>
